<div class="border-t border-slate-100 pt-3 mt-3 font-sans">
  
  <!-- Actions buttons Row -->
  <div class="flex items-center gap-6 text-xs text-slate-500 font-bold select-none">
    
    <!-- Heart Like button -->
    <button 
      (click)="toggleLike()"
      class="flex items-center gap-1.5 hover:text-rose-600 transition-colors active:scale-95 duration-200"
      [class.text-rose-600]="post.likedByCurrentUser"
    >
      <div [class.bouncy-heart]="likeCountAnimating">
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          [attr.fill]="post.likedByCurrentUser ? 'currentColor' : 'none'" 
          viewBox="0 0 24 24" 
          stroke-width="2" 
          stroke="currentColor" 
          class="w-5 h-5"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
      </div>
      <span class="likes-counter" [class.pop]="likeCountAnimating">{{ post.likesCount }}</span> Thích
    </button>

    <!-- Comment toggle button -->
    <button 
      (click)="toggleCommentsSection()"
      class="flex items-center gap-1.5 hover:text-indigo-600 transition-colors active:scale-95 duration-200"
      [class.text-indigo-600]="showComments()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l3.529-4.893a.925.925 0 0 1 .865-.501 48.17 48.17 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
      </svg>
      <span>{{ post.commentsCount }}</span> Bình luận
    </button>

  </div>

  <!-- Comments section dropdown -->
  <div *ngIf="showComments()" class="mt-4 pt-3 border-t border-slate-100 space-y-4 animate-slide-down">
    
    <!-- Write a comment form -->
    <form [formGroup]="commentForm" (ngSubmit)="submitComment()" class="flex items-center gap-3">
      <div class="h-7 w-7 rounded-full border border-slate-200 overflow-hidden bg-slate-100 flex-shrink-0 flex items-center justify-center font-black text-slate-400 text-[10px]">
        U
      </div>
      <div class="flex-1 relative">
        <input 
          type="text" 
          formControlName="content"
          placeholder="Viết bình luận của bạn..."
          class="w-full rounded-full border border-slate-200 bg-slate-50/70 px-4 py-2 text-xs text-slate-800 outline-none focus:border-indigo-400 focus:bg-white font-medium pr-10 shadow-inner"
        />
        
        <button 
          type="submit" 
          [disabled]="commentForm.invalid || isSubmittingComment()"
          class="absolute right-2 top-1.5 text-indigo-500 hover:text-indigo-700 disabled:opacity-40 transition active:scale-90"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
          </svg>
        </button>
      </div>
    </form>

    <!-- Comments List -->
    <div *ngIf="post.comments.length === 0" class="text-center py-4">
      <p class="text-[10px] text-slate-400 font-bold">Chưa có bình luận nào. Hãy là người đầu tiên chia sẻ cảm xúc!</p>
    </div>

    <div *ngIf="post.comments.length > 0" class="space-y-3.5 max-h-60 overflow-y-auto pr-1">
      <div 
        *ngFor="let comment of post.comments"
        class="flex items-start gap-2.5 text-xs"
        [class.animate-comment]="newCommentIds.has(comment.id)"
      >
        <div class="h-7 w-7 rounded-full border border-slate-200 overflow-hidden bg-slate-100 flex-shrink-0">
          <img *ngIf="comment.user.avatarUrl" [src]="comment.user.avatarUrl" class="w-full h-full object-cover" />
          <div *ngIf="!comment.user.avatarUrl" class="w-full h-full font-black text-slate-400 text-[9px] flex items-center justify-center">
            {{ comment.user.fullName.charAt(0) }}
          </div>
        </div>
        
        <div class="flex-1 bg-slate-50 border border-slate-100 rounded-2xl px-3.5 py-2.5">
          <div class="flex justify-between items-center mb-0.5">
            <span class="font-black text-slate-800 text-[11px]">{{ comment.user.fullName }}</span>
            <span class="text-[9px] text-slate-400 font-bold">{{ comment.createdAt | date:'dd/MM HH:mm' }}</span>
          </div>
          <p class="text-slate-650 leading-relaxed font-medium text-[11px]">{{ comment.content }}</p>
        </div>
      </div>
    </div>

  </div>

</div>
