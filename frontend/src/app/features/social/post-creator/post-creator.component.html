<div class="bg-white rounded-3xl border border-slate-200/80 p-6 shadow-sm font-sans mb-6">
  <form [formGroup]="postForm" (ngSubmit)="submitPost()" class="space-y-4">
    <!-- Header: What's on your mind? -->
    <div class="flex items-start gap-3">
      <div class="h-10 w-10 rounded-full border border-slate-200 overflow-hidden bg-slate-100 flex-shrink-0 flex items-center justify-center font-black text-slate-400">
        T
      </div>
      <div class="flex-1">
        <textarea 
          formControlName="content"
          rows="3"
          class="w-full text-xs text-slate-800 font-semibold bg-transparent border-0 outline-none resize-none placeholder-slate-400"
          placeholder="Bạn đang muốn chia sẻ trải nghiệm du lịch nào hôm nay?..."
        ></textarea>
      </div>
    </div>

    <!-- Image Previews -->
    <div *ngIf="imagePreviews().length > 0" class="grid grid-cols-5 gap-2 pt-2">
      <div *ngFor="let preview of imagePreviews(); let i = index" class="relative aspect-square rounded-2xl overflow-hidden border border-slate-200 bg-slate-50 group">
        <img [src]="preview" class="w-full h-full object-cover" />
        <button 
          type="button" 
          (click)="removeImage(i)"
          class="absolute top-1 right-1 p-1 rounded-full bg-slate-900/60 hover:bg-slate-950 text-white transition active:scale-90"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Dropdowns: Check-in Place & Tag Trip -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2 border-t border-slate-100">
      
      <!-- Check-in Place Selection -->
      <div class="space-y-1">
        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block">Check-in Địa điểm</label>
        <select 
          formControlName="placeId"
          class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3.5 py-2 text-xs text-slate-700 outline-none focus:border-indigo-400 focus:bg-white font-bold cursor-pointer"
        >
          <option value="">-- Không chọn --</option>
          <option *ngFor="let place of places()" [value]="place.id">
            📍 {{ place.name }}
          </option>
        </select>
      </div>

      <!-- Tag Trip Selection -->
      <div class="space-y-1">
        <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block">Gắn thẻ Chuyến đi (Trip Planner)</label>
        <select 
          formControlName="tripId"
          class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-3.5 py-2 text-xs text-slate-700 outline-none focus:border-indigo-400 focus:bg-white font-bold cursor-pointer"
        >
          <option value="">-- Không chọn --</option>
          <option *ngFor="let trip of trips()" [value]="trip.id">
            ✈️ {{ trip.title }} ({{ trip.startDate | date:'dd/MM/yy' }})
          </option>
        </select>
      </div>

    </div>

    <!-- Feedback message lines -->
    <div *ngIf="successMsg()" class="text-xs text-emerald-600 font-bold p-3 bg-emerald-50 rounded-xl border border-emerald-100">
      {{ successMsg() }}
    </div>
    <div *ngIf="errorMsg()" class="text-xs text-rose-600 font-bold p-3 bg-rose-50 rounded-xl border border-rose-100">
      {{ errorMsg() }}
    </div>

    <!-- Bottom Actions row -->
    <div class="flex justify-between items-center pt-3 border-t border-slate-100">
      <!-- Media attachment triggers -->
      <div>
        <label class="cursor-pointer flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-50 hover:bg-indigo-50 border border-slate-200/60 hover:border-indigo-200 text-slate-600 hover:text-indigo-700 transition active:scale-95 select-none text-[11px] font-bold">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
          </svg>
          Ảnh đính kèm (Tối đa 10)
          <input 
            type="file" 
            class="hidden" 
            (change)="onImagesSelected($event)" 
            multiple 
            accept="image/*"
          />
        </label>
      </div>

      <!-- Publish button -->
      <button 
        type="submit"
        [disabled]="isSubmitting() || (!postForm.get('content')?.value?.trim() && selectedImages().length === 0)"
        class="rounded-xl bg-slate-900 hover:bg-slate-800 disabled:opacity-40 text-white font-bold text-xs px-6 py-2.5 transition shadow active:scale-95"
      >
        {{ isSubmitting() ? 'Đang chia sẻ...' : 'Đăng Bài Viết' }}
      </button>
    </div>
  </form>
</div>
